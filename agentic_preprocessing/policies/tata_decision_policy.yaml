# agentic_preprocessing/policies/tata_decision_policy.yaml

# TinyAudioTriageAgent decision policy for v0.5 TATA.
#
# Important distinction:
#   Model labels describe what is present in the audio.
#   Policy decisions describe how the clip should be routed.
#
# In v0.5, TATA is a speaker+interviewer+event multi-label model.
# A single clip may contain a named speaker, the matching interviewer, and
# background/event tags such as music, applause, laughter, crowd noise, or silence.

policy_name: tata_decision_policy_v0_5_speaker_event_multilabel
agent_name: TinyAudioTriageAgent
branch: agentic_data_preprocessing_v0.5_tata

model_task:
  type: speaker_event_multilabel_audio_triage
  activation: sigmoid
  loss: BCEWithLogitsLoss
  purpose: rough_seed_trained_multilabel_labelling_for_final_models

labels:
  speaker_identity:
    - Brene_Brown
    - Eckhart_Tolle
    - Eric_Thomas
    - Gary_Vee
    - Jay_Shetty

  interviewer_identity:
    - Brene_Brown_interviewer
    - Eckhart_Tolle_interviewer
    - Eric_Thomas_interviewer
    - Gary_Vee_interviewer
    - Jay_Shetty_interviewer

  event_or_background:
    - music_present
    - applause_present
    - laughter_present
    - crowd_noise_present
    - silence_present

confidence:
  default_positive_threshold: 0.50
  low_confidence_margin: 0.10
  low_confidence_decision: needs_review
  notes:
    - Thresholds should be tuned per label after validation.
    - Low-confidence clips should be routed to human review, not automatically rejected.
    - TATA predictions are rough pseudo-labels for raw-data labelling; final models can learn more accurate multi-label predictions.

policy_rules:
  - condition: named speaker identity present only
    decision: accepted
    reason: target_named_speaker_present

  - condition: named speaker identity + music_present
    decision: accepted_with_warning
    reason: named_speaker_with_music

  - condition: named speaker identity + applause_present
    decision: accepted_with_warning_or_needs_review
    reason: named_speaker_with_applause

  - condition: named speaker identity + laughter_present
    decision: accepted_with_warning_or_needs_review
    reason: named_speaker_with_laughter

  - condition: named speaker identity + crowd_noise_present
    decision: accepted_with_warning_or_needs_review
    reason: named_speaker_with_crowd_noise

  - condition: named speaker identity + matching interviewer identity
    decision: needs_review
    reason: speaker_interviewer_overlap

  - condition: named speaker identity + strong_or_ambiguous_background_event
    decision: needs_review
    reason: speaker_present_but_background_may_reduce_usability

  - condition: interviewer identity without named speaker identity
    decision: rejected_or_needs_review
    reason: interviewer_without_named_target_speaker

  - condition: music_present only
    decision: rejected
    reason: music_without_named_speaker

  - condition: applause_present only
    decision: rejected
    reason: applause_without_named_speaker

  - condition: laughter_present only
    decision: rejected
    reason: laughter_without_named_speaker

  - condition: crowd_noise_present only
    decision: rejected
    reason: crowd_noise_without_named_speaker

  - condition: silence_present only
    decision: rejected
    reason: silence_without_named_speaker

  - condition: event/background labels without named speaker identity
    decision: rejected
    reason: non_speaker_content_without_named_speaker

  - condition: low_confidence
    decision: needs_review
    reason: low_confidence_prediction

safety_principles:
  - Do not force one label only; clips can contain multiple positive labels.
  - Do not reject a clip merely because music, applause, laughter, or crowd noise is present.
  - Named speaker plus light background event should usually be accepted_with_warning.
  - Named speaker plus strong or ambiguous background event should be needs_review.
  - Event-only, silence-only, or interviewer-only clips should not be treated as clean named-speaker training clips.
  - Human review should be used for uncertain or high-risk routing decisions.

expected_outputs_after_tata_inference:
  - tata_pseudo_labels.csv
  - tata_confidence_report.csv
  - tata_accepted_manifest.csv
  - tata_accepted_with_warning_manifest.csv
  - tata_needs_review_manifest.csv
  - tata_rejected_manifest.csv
